<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Loja e Promoções</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .promo-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Sistema de Promoções</h1>
    
    <div id="area-consumidor">
        <h2>Área do Consumidor - Categorias de Interesse</h2>
        <div class="promo-card" style="background-color: #f0f4f8;">
            <input type="text" id="campo-categoria" placeholder="Digite a categoria (ex: jogos)">
            <button onclick="gerirInteresse('fallow')">Seguir Categoria</button>
            <button onclick="gerirInteresse('unfallow')">Deixar de Seguir</button>
            <p><strong>Categorias seguidas atualmente:</strong> <span id="categorias-ativas">Nenhuma</span></p>
        </div>

        <h2>Promoções Publicadas</h2>
        <button onclick="carregarPromocoes()">Atualizar Promoções</button>
        <div id="lista-promocoes" style="margin-top: 15px;">
            <p>Nenhuma promoção carregada ainda. Clique no botão acima.</p>
        </div>
    </div>

    <script>
        const URL_BACKEND = "http://localhost:5000";
        //const URL_BACKEND = "http://localhost:8080";


        async function carregarPromocoes()
        {
            const divLista = document.getElementById('lista-promocoes');
            divLista.innerHTML = "<p>Carregando...</p>"; 

            try {
                const response = await fetch(`${URL_BACKEND}/promocoes`, {
                    method: 'GET'
                });

                if (!response.ok)
                {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }

                const promocoes = await response.json();

                divLista.innerHTML = ""; 

                if (promocoes.length === 0)
                {
                    divLista.innerHTML = "<p>Nenhuma promoção encontrada.</p>";
                    return;
                }

                promocoes.forEach(promo =>{
                    const promoHTML = `
                        <div class="promo-card">
                            <strong>${promo.item}</strong><br>
                            <small>Categoria: ${promo.categoria || 'Não definida'}</small><br>
                            <p>${promo.descricao || ''}</p>


                            <button onclick="votar('${promo.item}', 1)"> 👍 </button>

                            <button onclick="votar('${promo.item}', -1)"> 👎 </button>


                        </div>
                    `;
                    divLista.innerHTML += promoHTML;
                });

            } catch (error) {
                console.error("Erro ao carregar promoções:", error);
                divLista.innerHTML = `<p style="color: red;">Erro ao conectar com a API: ${error.message}</p>`;
            }
        }


        async function votar(nomeItem, valorVoto)
        {
            const payload = 
            {
                "item": nomeItem,
                "voto": valorVoto
            }

            try
            {
                const response = await fetch(`${URL_BACKEND}/promocoes/votar`, {
                    method: 'POST',
                    headers: {"Content-Type": "application/json"} ,
                    body: JSON.stringify(payload)
                });

                if(response.ok)
                {
                    //alert(` Voto(${valorVoto > 0 ? '1' : '-1'}) computado para o item :${nomeItem}`);
                }
                else
                {
                    alert("Erro, cortaram as asinhas do horus");
                }
            }
            catch(error)
            {
                console.error("erro ao votar", error);
                alert("deu merda paizão")
            }
            
        }




        let categoriasSeguidas = [];

        async function gerirInteresse(acao) {
            const categoria = document.getElementById('campo-categoria').value.trim().toLowerCase();
            
            if (!categoria) {
                alert("semNada no campo de categoria");
                return;
            }

            const rota = acao === 'fallow' ? '/promocoes/interesse' : '/promocoes/desinteresse';
            
            const payload = { categoria: categoria };

            try {
                const response = await fetch(`${URL_BACKEND}${rota}`, {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    if (acao === 'fallow') {
                        if (!categoriasSeguidas.includes(categoria)) categoriasSeguidas.push(categoria);
                        alert(`segue a categoria : ${categoria}`);
                    } else {
                        categoriasSeguidas = categoriasSeguidas.filter(c => c !== categoria);
                        alert(`não segue mais: ${categoria}`);
                    }
                    
                    document.getElementById('categorias-ativas').innerText = categoriasSeguidas.length > 0 ? categoriasSeguidas.join(', ') : "Nenhuma";
                    document.getElementById('campo-categoria').value = "";
                } else {
                    alert("Erroreceba.");
                }
            } catch (error) {
                console.error("Erro:", error);
            }
        }






    </script>
</body>
</html>
